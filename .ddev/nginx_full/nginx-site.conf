# Replace the default DDEV nginx site so every request — HTML, HMR
# WebSocket, the /v1/* proxy — funnels into the Vite dev server (port
# 5173) running inside the same web container. Without this the default
# nginx tries to serve index.html from disk and never reaches Vite.
#
# CAUTION: this is a *_full nginx config — it fully replaces the default
# one rather than extending it (compare nginx_snippets for additive edits).

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    # Vite's HMR WebSocket needs upgrade headers; the entire app benefits
    # from passing them through so the same `location /` block handles
    # both regular HTTP fetches and the /__vite/* websocket frames.
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vite dev rebuilds can be slow on cold-start (esbuild scanning) —
        # bump timeouts so the first request after `ddev start` doesn't
        # 504 on us.
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
